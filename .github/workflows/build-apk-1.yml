name: Build AniNova APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL API (contoh: https://example.com/)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
        
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set Base URL
        run: |
          BASE_URL="${{ github.event.inputs.base_url }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://apk-ani-novazip--apkaninova.replit.app/"
          fi
          sed -i "s|https://apk-ani-novazip--apkaninova.replit.app/|$BASE_URL|g" android/app/build.gradle.kts
          echo "Using BASE_URL: $BASE_URL"

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AniNova-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AniNova-release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
        continue-on-error: true
